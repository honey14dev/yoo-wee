<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoo-Wee Diner — Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f9f1e5;
      --panel: #fffdfb;
      --text: #2d241e;
      --muted: #756b61;
      --gold: #e8a93c;
      --red: #c6362b;
      --red-deep: #7e1e1b;
      --navy: #1c2a47;
      --line: #2a1b15;
      --success: #1f7a52;
      --shadow: 0 14px 30px rgba(36, 24, 15, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      background: radial-gradient(circle at top left, #fff9ef 0%, #f9edd7 40%, #f4e8d5 100%);
      color: var(--text);
    }

    .checker {
      height: 34px;
      width: 100%;
      background-image: repeating-linear-gradient(45deg, var(--red) 0 17px, var(--bg) 17px 34px);
      border-bottom: 4px solid var(--line);
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 0 48px;
    }

    .hero {
      position: relative;
      padding: 72px 24px 64px;
      text-align: center;
      background: linear-gradient(rgba(25,16,12,0.36), rgba(25,16,12,0.36)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80') center/cover;
      color: #fffdfa;
      box-shadow: var(--shadow);
      border-bottom: 4px solid var(--line);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8px;
      background: repeating-linear-gradient(
        180deg,
        var(--red) 0 12px,
        #fff7df 12px 24px,
        var(--gold) 24px 36px,
        var(--navy) 36px 48px
      );
      background-size: 180% 180%;
      animation: stripeMove 14s linear infinite;
    }

    .hero::before { left: 0; }
    .hero::after { right: 0; }

    .back-link {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.94);
      color: var(--red-deep);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.14);
    }

    .back-link:hover {
      background: #fffefb;
      transform: translateY(-1px);
    }

    .hero-inner {
      max-width: 970px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .badge {
      width: 150px;
      height: 150px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 5px solid rgba(255,253,247,0.95);
      background: rgba(251,241,227,0.93);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 36px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .badge img { width: 100%; height: 100%; object-fit: contain; }

    .brand-script {
      font-family: 'Bagel Fat One', cursive;
      color: #fff7ce;
      font-size: clamp(48px, 9vw, 96px);
      margin: 6px 0 0;
      line-height: 0.95;
      text-shadow: 3px 3px 0 rgba(198,54,43,0.95);
    }

    .brand-sub {
      font-family: 'Bagel Fat One', cursive;
      color: #fffdf8;
      font-size: clamp(18px, 3vw, 28px);
      letter-spacing: 6px;
      margin-top: 4px;
    }

    .tagline {
      margin: 18px auto 0;
      max-width: 680px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffe8b5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
      padding: 0 20px;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #fffaf1, #f8edd9);
      border: 3px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 26px 26px 22px;
      isolation: isolate;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 5px;
      background: repeating-linear-gradient(
        135deg,
        var(--red) 0 12px,
        #fff7df 12px 24px,
        var(--gold) 24px 36px,
        var(--navy) 36px 48px
      );
      background-size: 180% 180%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: stripeMove 90s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    .panel h2 {
      margin: 0 0 18px;
      font-family: 'Bagel Fat One', cursive;
      font-size: clamp(28px, 4vw, 38px);
      color: var(--red);
      text-align: center;
    }

    @keyframes stripeMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 140% 140%; }
    }

    .kicker {
      display: block;
      text-align: center;
      margin: 0 auto 20px;
      padding: 5px 14px;
      border-radius: 999px;
      background: var(--gold);
      color: var(--navy);
      width: max-content;
      border: 2px solid var(--line);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .summary-card,
    .payment-box {
      background: linear-gradient(180deg, #fffaf2, #fdf4e6);
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    }

    .order-list {
      display: grid;
      gap: 8px;
      margin-bottom: 8px;
    }

    .order-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.95rem;
    }

    .order-line.empty {
      color: var(--muted);
      font-style: italic;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.98rem;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(45,36,30,0.25);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-row strong { color: var(--red); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--navy);
    }

    input,
    select,
    textarea {
      width: 100%;
      border-radius: 10px;
      border: 2px solid var(--line);
      background: #fffdf8;
      padding: 12px 13px;
      font: inherit;
      color: var(--text);
      outline: none;
      font-family: 'Oswald', sans-serif;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216,165,58,0.18);
    }

    textarea { min-height: 100px; resize: vertical; }

    .payment-box { margin-top: 18px; }
    .payment-box h3 { margin: 0 0 12px; color: var(--red); font-size: 1.05rem; }
    .note { margin-top: 8px; font-size: 0.83rem; color: var(--muted); }

    .cta {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--gold), #f0c368);
      color: var(--navy);
      font-weight: 800;
      font-size: 0.98rem;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(216,165,58,0.28);
    }

    .success {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(31,122,82,0.1);
      color: var(--success);
      font-weight: 700;
      display: none;
    }

    .success.show { display: block; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .field.full {
        grid-column: 1;
      }
      
      .panel {
        margin: 0 12px;
      }
      
      input, select, textarea {
        font-size: 16px;
      }
      
      .cta {
        font-size: 0.95rem;
        padding: 12px 14px;
      }
    }
    
    @media (max-width: 600px) {
      .grid {
        gap: 16px;
        margin-top: 16px;
        padding: 0 12px;
      }
      
      .panel {
        padding: 18px 16px 14px;
        margin: 0;
      }
      
      .form-grid {
        gap: 10px;
      }
      
      .field {
        gap: 5px;
      }
      
      label {
        font-size: 0.85rem;
      }
      
      input, select, textarea {
        padding: 10px 11px;
        font-size: 16px;
      }
      
      textarea {
        min-height: 80px;
      }
      
      .order-line {
        font-size: 0.9rem;
      }
      
      .summary-row {
        font-size: 0.9rem;
        padding: 6px 0;
      }
    }
  </style>
</head>
<body>
  <div class="checker"></div>
  <div class="shell">
    <header class="hero">
      <a class="back-link" href="home.html">← Back</a>
      <div class="hero-inner">
        <div class="badge" aria-hidden="true">
          <img src="Unknown-5.jpg" alt="Yoo-Wee Diner logo" />
        </div>
        <h1 class="brand-script">Yoo-Wee</h1>
        <div class="brand-sub">D I N E R</div>
        <p class="tagline">Burgers · Overloads · Bottomless Cheese Sauce</p>
      </div>
    </header>

    <section class="grid">
      <div class="panel">
        <span class="kicker">Order Summary</span>
        <h2>Ready to Serve</h2>

        <div class="summary-card">
          <div class="order-list" id="orderList">
            <div class="order-line empty">No items selected yet.</div>
          </div>
          <div class="summary-row"><span>Delivery Fee</span><span>₱40</span></div>
          <div class="summary-row"><span>Service Charge</span><span>₱20</span></div>
          <div class="summary-row"><span>Payment Total</span><strong id="paymentTotal">₱60</strong></div>
        </div>

      </div>

      <div class="panel">
        <span class="kicker">Customer Information</span>
        <h2>Checkout Details</h2>

        <form id="checkoutForm">
          <div class="form-grid">
            <div class="field">
              <label for="customerName">Customer Name</label>
              <input id="customerName" type="text" placeholder="Enter customer name" required />
            </div>
            <div class="field">
              <label for="phone">Phone Number</label>
              <input id="phone" type="tel" placeholder="09XXXXXXXXX" required />
            </div>
            <div class="field">
              <label for="address">Delivery Address</label>
              <input id="address" type="text" placeholder="House/Street/Barangay" required />
            </div>
            <div class="field full">
              <label for="notes">Order Notes</label>
              <textarea id="notes" placeholder="Special instructions, preferred delivery time, extra sauce, etc."></textarea>
            </div>
            <div class="field">
              <label for="paymentMethod">Payment Method</label>
              <select id="paymentMethod">
                <option>Cash on Delivery</option>
                <option>GCash</option>
              </select>
            </div>
            <div class="field full">
              <label for="reference">Reference / Receipt No.</label>
              <input id="reference" type="text" placeholder="Enter reference after completing payment" />
            </div>
          </div>

          <button class="cta" type="submit">Confirm Order</button>
          <div class="success" id="successMsg">Order details saved successfully.</div>
        </form>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById('checkoutForm');
    const successMsg = document.getElementById('successMsg');
    const paymentTotal = document.getElementById('paymentTotal');
    const orderList = document.getElementById('orderList');
    const paymentMethod = document.getElementById('paymentMethod');
    const referenceInput = document.getElementById('reference');
    const deliveryFee = 40;
    const serviceCharge = 20;
    const dinerGcashNumber = '09306113595';
    const gcashReferencePattern = /^[A-Za-z0-9][A-Za-z0-9\- ]{5,}$/;
    const backendUrl = 'http://localhost:5001'; // Changed to port 5001

    const savedOrderData = JSON.parse(localStorage.getItem('yooWeeOrder') || 'null');
    let order = null;

    // Handle both old format (array) and new format (object with items and subtotal)
    if (Array.isArray(savedOrderData)) {
      order = savedOrderData;
    } else if (savedOrderData && savedOrderData.items) {
      order = savedOrderData.items;
    }

    function renderSummary(order) {
      if (!order || !order.length) {
        orderList.innerHTML = '<div class="order-line empty">No items selected yet.</div>';
        paymentTotal.textContent = `₱${deliveryFee + serviceCharge}`;
        return;
      }

      orderList.innerHTML = order.map((item) => `
        <div class="order-line">
          <span>${item.qty} × ${item.name}</span>
          <strong>₱${item.total}</strong>
        </div>
      `).join('');

      const subtotal = order.reduce((sum, item) => sum + item.total, 0);
      paymentTotal.textContent = `₱${subtotal + deliveryFee + serviceCharge}`;
    }

    function getOrderTotal() {
      if (!order || !order.length) {
        return deliveryFee + serviceCharge;
      }
      const subtotal = order.reduce((sum, item) => sum + item.total, 0);
      return subtotal + deliveryFee + serviceCharge;
    }

    async function initiateGcashPayment(customerData) {
      const total = getOrderTotal();
      
      try {
        // Send order data to backend to create GCash payment link
        const response = await fetch(`${backendUrl}/create-gcash-payment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: total,
            customerName: customerData.name,
            phone: customerData.phone,
            address: customerData.address,
            notes: customerData.notes,
            items: order || []
          })
        });

        const data = await response.json();
        
        if (data.success && data.paymentUrl) {
          // Store order details in sessionStorage for callback
          sessionStorage.setItem('pendingOrder', JSON.stringify(customerData));
          sessionStorage.setItem('orderItems', JSON.stringify(order));
          
          // Redirect to GCash payment
          window.location.href = data.paymentUrl;
        } else {
          successMsg.textContent = 'Error creating payment. Please try again.';
          successMsg.classList.add('show');
        }
      } catch (error) {
        console.error('Payment error:', error);
        successMsg.textContent = 'Payment service unavailable. Please try again later.';
        successMsg.classList.add('show');
      }
    }

    function openGcashApp() {
      const total = getOrderTotal();
      const gcashUrl = `https://www.gcash.com/?amount=${total}&receiver=${encodeURIComponent(dinerGcashNumber)}`;
      window.open(gcashUrl, '_blank');
    }

    renderSummary(order);

    paymentMethod.addEventListener('change', function () {
      const referenceField = referenceInput.closest('.field');
      
      if (this.value === 'GCash') {
        // For GCash, hide the reference field - it's auto-handled
        referenceField.style.display = 'none';
        referenceInput.required = false;
      } else {
        // For Cash on Delivery, show and make optional
        referenceField.style.display = 'flex';
        referenceInput.required = false;
      }
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const customerName = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const selectedMethod = paymentMethod.value;

      // Validate required fields
      if (!customerName) {
        successMsg.textContent = 'Please enter customer name.';
        successMsg.classList.add('show');
        return;
      }
      if (!phone) {
        successMsg.textContent = 'Please enter phone number.';
        successMsg.classList.add('show');
        return;
      }
      if (!address) {
        successMsg.textContent = 'Please enter delivery address.';
        successMsg.classList.add('show');
        return;
      }

      const customerData = {
        name: customerName,
        phone: phone,
        address: address,
        notes: notes,
        method: selectedMethod
      };

      if (selectedMethod === 'GCash') {
        // Initiate GCash payment flow
        initiateGcashPayment(customerData);
      } else {
        // Cash on Delivery - save order immediately
        saveOrder(customerData);
      }
    });

    function saveOrder(customerData) {
      const total = getOrderTotal();
      
      // Show loading state
      successMsg.textContent = 'Processing order...';
      successMsg.classList.add('show');
      
      try {
        fetch(`${backendUrl}/save-order`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer: customerData,
            items: order || [],
            total: total,
            paymentMethod: customerData.method,
            status: 'confirmed'
          })
        }).then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
          .then(data => {
            if (data.success) {
              successMsg.textContent = 'Order confirmed successfully! Order #' + data.orderId;
              successMsg.classList.add('show');
              localStorage.removeItem('yooWeeOrder');
              sessionStorage.clear();
            } else {
              successMsg.textContent = 'Error saving order: ' + (data.error || 'Unknown error');
              successMsg.classList.add('show');
            }
          })
          .catch(error => {
            console.error('Order error:', error);
            successMsg.textContent = 'Order confirmed (local). Check your orders!';
            successMsg.classList.add('show');
            localStorage.removeItem('yooWeeOrder');
          });
      } catch (error) {
        console.error('Error:', error);
        successMsg.textContent = 'Order confirmed successfully!';
        successMsg.classList.add('show');
        localStorage.removeItem('yooWeeOrder');
      }
    }

    // Check if returning from successful payment
    function checkPaymentStatus() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('payment') === 'success') {
        const pendingOrder = sessionStorage.getItem('pendingOrder');
        if (pendingOrder) {
          const customerData = JSON.parse(pendingOrder);
          customerData.method = 'GCash';
          saveOrder(customerData);
        }
      }
    }

    checkPaymentStatus();
  </script>
</body>
</html>
